                    [then]
                        [harm_unit]
                            [filter]
                                find_in = pierce_hit_unit
                            [/filter]
                            [filter_second]
                                find_in = unit
                            [/filter_second]
                            amount = $weapon.damage
                            damage_type = $weapon.type
                            alignment = $unit.alignment
