#define WEAPON_SPECIAL_PIERCE_EVENTS
    [event]
        name = attacker_hits, attacker_misses
        id = pierce_hits
        first_time_only = no
        [filter_attack]
            special_id = pierce
        [/filter_attack]
        [store_unit]
            [filter]
                [not]
                    find_in = second_unit
                [/not]
                [filter_adjacent]
                    find_in = second_unit
                    adjacent = $second_unit.facing
                [/filter_adjacent]
            [/filter]
            variable = pierce_hit_units
        [/store_unit]
        [foreach]
            array=pierce_hit_units
            variable=pierce_hit_unit
